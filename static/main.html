<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 文件助手 - 量化数据版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chat-box { height: calc(100vh - 250px); overflow-y: auto; scroll-behavior: smooth; }
        .bubble { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.6; }
        .bubble-user { background-color: #4f46e5; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .bubble-ai { background-color: #f3f4f6; color: #1f2937; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #e5e7eb; }
        .typing { display: flex; gap: 4px; padding: 12px; width: fit-content; }
        .dot { width: 6px; height: 6px; background: #9ca3af; border-radius: 50%; animation: blink 1.4s infinite both; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div class="max-w-6xl mx-auto p-4 md:p-6">
        <header class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">AI 文件处理中心</h1>
                <p class="text-sm text-slate-500">支持 A 股行情数据筛选与 PDF 转换</p>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <div class="md:col-span-1">
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 sticky top-6">
                    <h2 class="font-semibold mb-4 text-slate-700 flex items-center gap-2">
                        <span class="w-2 h-5 bg-indigo-500 rounded-full"></span>
                        1. 准备数据
                    </h2>
                    <div id="drop-zone" class="group border-2 border-dashed border-slate-200 rounded-xl p-6 text-center cursor-pointer hover:border-indigo-400 hover:bg-indigo-50/30 transition-all">
                        <div class="text-3xl mb-2 group-hover:scale-110 transition-transform">📂</div>
                        <p class="text-xs text-slate-400">点击或拖拽 A 股数据文件</p>
                        <input type="file" id="file-input" class="hidden" multiple>
                    </div>
                    <div id="file-status" class="mt-4 hidden">
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">已加载文件</p>
                        <ul id="file-list" class="space-y-2"></ul>
                    </div>
                </div>
            </div>

            <div class="md:col-span-3 flex flex-col bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div id="chat-content" class="chat-box p-6 flex flex-col space-y-6">
                    <div class="bubble bubble-ai">
                        您好！作为您的量化分析助手，您可以上传 A 股历史行情文件（CSV/Excel），我会帮您进行复杂的筛选和处理。
                    </div>
                </div>

                <div class="p-4 bg-white border-t border-slate-100">
                    <div class="relative flex items-center">
                        <input type="text" id="user-input"
                               onkeypress="if(event.keyCode==13) handleSend()"
                               class="w-full bg-slate-50 border-none rounded-xl pl-4 pr-24 py-3 focus:ring-2 focus:ring-indigo-500 text-sm"
                               placeholder="例如：筛选 low 字段大于 6.6 的数据行">
                        <button onclick="handleSend()" class="absolute right-2 bg-indigo-600 text-white px-5 py-1.5 rounded-lg text-sm font-medium hover:bg-indigo-700 transition shadow-sm">
                            发送
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        const fileList = document.getElementById('file-list');
        const chatContent = document.getElementById('chat-content');

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            if(e.target.files.length > 0) document.getElementById('file-status').classList.remove('hidden');
            fileList.innerHTML = '';
            Array.from(e.target.files).forEach(f => {
                const li = document.createElement('li');
                li.className = "flex items-center gap-2 p-2 bg-slate-50 rounded-lg border border-slate-100 text-xs text-slate-600";
                li.innerHTML = `<span class="opacity-50 text-sm">📄</span> <span class="truncate font-medium">${f.name}</span>`;
                fileList.appendChild(li);
            });
        };

        /**
         * 核心改进：在气泡中集成下载 UI
         */
        function addBubble(text, isAi = false, downloadUrl = null) {
            const div = document.createElement('div');
            div.className = isAi ? "bubble bubble-ai shadow-sm" : "bubble bubble-user shadow-md";

            let content = `<div class="whitespace-pre-wrap">${text}</div>`;

            // 如果 AI 成功返回了下载路径，则渲染下载卡片
            if (isAi && downloadUrl) {
                const fileName = downloadUrl.split('/').pop();
                content += `
                    <div class="mt-4 p-3 bg-white rounded-xl border border-slate-200 flex items-center justify-between shadow-inner">
                        <div class="flex items-center gap-3 overflow-hidden">
                            <div class="bg-emerald-100 text-emerald-600 w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0">📊</div>
                            <div class="overflow-hidden">
                                <p class="text-[11px] font-bold text-slate-400 uppercase tracking-tighter">处理完成版本</p>
                                <p class="text-xs font-semibold text-slate-700 truncate w-32 md:w-48">${fileName}</p>
                            </div>
                        </div>
                        <div class="flex gap-2">
                             <button onclick="window.open('${downloadUrl}', '_blank')" class="px-3 py-1.5 bg-slate-100 text-slate-600 text-xs rounded-md hover:bg-slate-200 transition">预览</button>
                             <a href="${downloadUrl}" download class="px-3 py-1.5 bg-indigo-600 text-white text-xs rounded-md hover:bg-indigo-700 transition">下载</a>
                        </div>
                    </div>`;
            }

            div.innerHTML = content;
            chatContent.appendChild(div);
            chatContent.scrollTop = chatContent.scrollHeight;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.id = "typing-indicator";
            div.className = "bubble bubble-ai typing shadow-sm";
            div.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
            chatContent.appendChild(div);
            chatContent.scrollTop = chatContent.scrollHeight;
        }

        function removeTyping() {
            const el = document.getElementById('typing-indicator');
            if (el) el.remove();
        }

        async function handleSend() {
            const userInput = document.getElementById('user-input');
            const prompt = userInput.value.trim();
            if (!prompt) return;

            addBubble(prompt, false);
            userInput.value = '';

            const formData = new FormData();
            if (fileInput.files.length === 0) {
                addBubble("请先上传文件（如 sh.600000.csv）再发送指令。", true);
                return;
            }
            for (let file of fileInput.files) formData.append("files", file);
            formData.append("prompt", prompt);

            showTyping();

            try {
                const response = await fetch('/process', { method: 'POST', body: formData });
                const result = await response.json();
                removeTyping();

                if (result.status === "success") {
                    // 传入返回的下载 URL 到气泡中
                    addBubble(result.message, true, result.download_url);
                } else {
                    addBubble("处理出错：" + result.message, true);
                }
            } catch (error) {
                removeTyping();
                addBubble("连接后端失败，请确保本地 Ollama 正在运行。", true);
            }
        }
    </script>
</body>
</html>

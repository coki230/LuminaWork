<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 文件助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chat-box { height: 400px; overflow-y: auto; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-8">

    <div class="max-w-4xl mx-auto space-y-6">
        <!-- 顶部标题 -->
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">AI 文件处理中心</h1>
            <p class="text-gray-600">合并图片为PDF，或通过对话修改 Excel</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

            <!-- 左侧：文件上传区 -->
            <div class="md:col-span-1 bg-white p-6 rounded-xl shadow-md">
                <h2 class="font-bold mb-4 text-indigo-600">1. 上传附件</h2>
                <div id="drop-zone" class="border-2 border-dashed border-gray-300 rounded-lg p-4 text-center cursor-pointer hover:border-indigo-500 transition">
                    <p class="text-sm text-gray-500">点击或拖拽文件到此处</p>
                    <input type="file" id="file-input" class="hidden" multiple>
                </div>
                <ul id="file-list" class="mt-4 text-xs text-gray-600 space-y-1"></ul>
            </div>

            <!-- 右侧：对话与反馈区 -->
            <div class="md:col-span-2 space-y-6">
                <!-- 对话框 -->
                <div class="bg-white rounded-xl shadow-md flex flex-col">
                    <div id="chat-content" class="chat-box p-4 space-y-4 border-b">
                        <div class="bg-gray-100 p-3 rounded-lg self-start text-sm text-gray-700">
                            您好！请上传文件并告诉我您想如何处理它们？（例如：“把图片合并成PDF” 或 “在Excel第一列后增加求和列”）
                        </div>
                    </div>
                    <div class="p-4 flex gap-2">
                        <input type="text" id="user-input" class="flex-1 border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="描述您的需求...">
                        <button onclick="handleSend()" class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700">发送</button>
                    </div>
                </div>

                <!-- 后台返回内容 -->
                <div id="result-area" class="hidden bg-green-50 border border-green-200 p-4 rounded-xl">
                    <h3 class="text-green-800 font-bold mb-2 text-sm">处理结果：</h3>
                    <div id="response-text" class="text-gray-700 text-sm mb-3"></div>
                    <a id="download-link" href="#" class="inline-flex items-center text-indigo-600 font-medium hover:underline">
                        <span>📥 下载生成的文件</span>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 处理文件选择显示
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        const fileList = document.getElementById('file-list');

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            fileList.innerHTML = '';
            Array.from(e.target.files).forEach(f => {
                const li = document.createElement('li');
                li.textContent = `📄 ${f.name}`;
                fileList.appendChild(li);
            });
        };

        // 模拟发送逻辑
        async function handleSend() {
            const fileInput = document.getElementById('file-input');
            const userInput = document.getElementById('user-input');
            const formData = new FormData();

            // 1. 装载文件
            for (let file of fileInput.files) {
                formData.append("files", file);
            }
            // 2. 装载指令
            formData.append("prompt", userInput.value);

            // 3. 发送到后端
            try {
                const response = await fetch('/process', { // 使用相对路径即可
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();

                // 在对话框显示 Agent 的回答
                const chatBox = document.getElementById('chat-content');
                chatBox.innerHTML += `<div class="bg-gray-200 p-2 rounded">AI: ${result.message}</div>`;

                // 如果返回的内容里包含文件路径，可以动态显示下载链接
                // (进阶建议：让 Agent 在回复中直接给出文件名)
            } catch (error) {
                console.error("提交失败:", error);
            }
        }
    </script>
</body>
</html>
